/* ═══════════════════════════════════════════════

   5. 左側選單 → Authentication → Sign-in method → 啟用「匿名」
   6. Firestore 規則貼上(見部署說明):
      只允許已登入者讀寫單一文件、禁止列出清單
   帳本文件 ID = 通關密語的 SHA-256,猜不到密語就找不到資料
   未填寫時,資料只會存在這台裝置的 localStorage(無法共同編輯)
═══════════════════════════════════════════════ */

  appId: "1:268720730947:web:e57479035d5c0ebd81b5f6"
};

/* Firestore 集合名稱 */
const DOC_COLLECTION = "ledger";
</script>

<style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ─────────────────────────────────────────
   記帳本 · 現代大地色
   Firebase Firestore 即時共同編輯
───────────────────────────────────────── */

const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);

const CURRENCIES = [
  ["TWD", "NT$"], ["USD", "US$"], ["JPY", "JP¥"], ["EUR", "€"],
  ["CNY", "CN¥"], ["HKD", "HK$"], ["GBP", "£"], ["AUD", "AU$"], ["KRW", "₩"],
];
const SYM = Object.fromEntries(CURRENCIES);

const P_BF = "豬寶包";
const P_ME = "詹小寶";
const MIN_YM = "2026-07";

const DEFAULT_DATA = {
  categories: [
    { id: "c1", name: "飲食", emoji: "🍜", color: "#8A9B6E" },
    { id: "c2", name: "購物", emoji: "🛍️", color: "#C89B6D" },
    { id: "c3", name: "日用", emoji: "🧺", color: "#9AA6A0" },
    { id: "c4", name: "娛樂", emoji: "🎧", color: "#B98D7F" },
    { id: "c5", name: "交通", emoji: "🚌", color: "#8E9AB0" },
  ],
  wallets: [
    { id: "w0", name: "現金", type: "cash", currency: "TWD", balance: 0 },
    { id: "w3", name: "一銀", type: "bank", currency: "TWD", balance: 0 },
    { id: "w4", name: "永豐", type: "bank", currency: "TWD", balance: 0 },
    { id: "w5", name: "中信", type: "bank", currency: "TWD", balance: 0 },
    { id: "w6", name: "國泰", type: "bank", currency: "TWD", balance: 0 },
    { id: "w1", name: "中信", type: "credit", currency: "TWD", closeDay: null, payDay: null, linkedWalletId: "", paidThrough: "" },
    { id: "w2", name: "國泰", type: "credit", currency: "TWD", closeDay: 23, payDay: 9, linkedWalletId: "w6", paidThrough: "" },
  ],
  records: [],
  splits: [],
};

/* ── 日期工具 ── */
const pad = (n) => String(n).padStart(2, "0");
const iso = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const todayStr = () => iso(new Date());
const nowYm = () => todayStr().slice(0, 7);
const shiftYm = (ym, delta) => {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}`;
};
const clampDate = (y, m, day) => {
  const dim = new Date(y, m + 1, 0).getDate();
  return new Date(y, m, Math.min(day, dim));
};
const lastCloseDate = (closeDay, ref = new Date()) => {
  let c = clampDate(ref.getFullYear(), ref.getMonth(), closeDay);
  if (iso(c) > iso(ref)) c = clampDate(ref.getFullYear(), ref.getMonth() - 1, closeDay);
  return c;
};
const dueDateFor = (closeDate, payDay) => {
  let d = clampDate(closeDate.getFullYear(), closeDate.getMonth(), payDay);
  if (iso(d) <= iso(closeDate)) d = clampDate(closeDate.getFullYear(), closeDate.getMonth() + 1, payDay);
  return d;
};
const cardStat = (card, records) => {
  const recs = records.filter((r) => r.walletId === card.id);
  const pt = card.paidThrough || "";
  if (!card.closeDay || !card.payDay) {
    const upcoming = recs.filter((r) => r.date > pt).reduce((s, r) => s + r.amount, 0);
    return { due: 0, upcoming, dueDate: null, lastClose: null, ready: false };
  }
  const lc = lastCloseDate(card.closeDay);
  const lcIso = iso(lc);
  const due = recs.filter((r) => r.date > pt && r.date <= lcIso).reduce((s, r) => s + r.amount, 0);
  const upcoming = recs.filter((r) => r.date > lcIso).reduce((s, r) => s + r.amount, 0);
  return { due, upcoming, dueDate: iso(dueDateFor(lc, card.payDay)), lastClose: lcIso, ready: true };
};

const fmtC = (n, cur = "TWD") =>
  (SYM[cur] || cur) + " " + Math.round(n).toLocaleString("zh-TW");

/* 舊資料升級 */
const migrate = (d) => {
  d.splits ||= [];
  d.records ||= [];
  d.categories ||= structuredClone(DEFAULT_DATA.categories);
  d.wallets ||= structuredClone(DEFAULT_DATA.wallets);
  if (!d.wallets.some((w) => w.type === "cash"))
    d.wallets.unshift({ id: uid(), name: "現金", type: "cash", currency: "TWD", balance: 0 });
  ["中信", "國泰"].forEach((n) => {
    if (!d.wallets.some((w) => w.type !== "credit" && w.name === n))
      d.wallets.push({ id: uid(), name: n, type: "bank", currency: "TWD", balance: 0 });
  });
  d.wallets.forEach((w) => {
    if (w.type !== "credit") return;
    w.paidThrough ??= "";
    w.closeDay ??= null;
    if (w.name === "國泰" && !w.closeDay) {
      w.closeDay = 23;
      w.payDay = w.payDay || 9;
      if (!w.linkedWalletId) {
        const acct = d.wallets.find((x) => x.type !== "credit" && x.name === "國泰");
        if (acct) w.linkedWalletId = acct.id;
      }
    }
  });
  return d;
};

/* 繳款日到了 → 自動從連結帳戶扣本期應繳 */
const autoSettle = (d) => {
  const today = todayStr();
  const notices = [];
  d.wallets.forEach((card) => {
    if (card.type !== "credit" || !card.closeDay || !card.payDay || !card.linkedWalletId) return;
    let lc = lastCloseDate(card.closeDay);
    let guard = 0;
    while (guard++ < 4 && iso(dueDateFor(lc, card.payDay)) > today) {
      lc = clampDate(lc.getFullYear(), lc.getMonth() - 1, card.closeDay);
    }
    const lcIso = iso(lc);
    if (guard > 4 || lcIso <= (card.paidThrough || "")) return;
    const amount = d.records
      .filter((r) => r.walletId === card.id && r.date > (card.paidThrough || "") && r.date <= lcIso)
      .reduce((s, r) => s + r.amount, 0);
    const acct = d.wallets.find((x) => x.id === card.linkedWalletId);
    if (amount > 0 && acct) {
      acct.balance -= amount;
      notices.push(`已自動扣款:${card.name}卡費 ${fmtC(amount, card.currency)},從「${acct.name}」扣除`);
    }
    card.paidThrough = lcIso;
  });
  return notices;
};

const CATEGORY_COLORS = ["#8A9B6E", "#C89B6D", "#9AA6A0", "#B98D7F", "#8E9AB0", "#B7A77C", "#97876F", "#A98FA0"];
const EMOJIS = ["🍜","🛍️","🧺","🎧","🚌","💊","☕","🏠","📚","🎁","🐈","💄","🧾","✈️","🎬","🌿"];

/* ─────────────────────────────────────────
   儲存層:Firebase Firestore(即時同步)
   匿名登入 + 通關密語(SHA-256 → 文件 ID)
   未設定 Firebase 時退回 localStorage
───────────────────────────────────────── */
const firebaseReady = (() => {
  try {
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.includes("貼上")) return false;
    firebase.initializeApp(FIREBASE_CONFIG);
    return true;
  } catch (e) {
    console.warn("Firebase 初始化失敗:", e);
    return false;
  }
})();
const LOCAL_KEY = "ledger-local-v1";
const PASS_KEY = "ledger-docid-v1";     // 記住已解鎖的帳本 ID

const sha256Hex = async (str) => {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, "0")).join("");
};
const getDocRef = (docId) =>
  firebaseReady && docId ? firebase.firestore().collection(DOC_COLLECTION).doc(docId) : null;

/* ───────── 通關密語鎖定畫面 ───────── */
function LockScreen({ onUnlock }) {
  const [pass, setPass] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const go = async () => {
    if (!pass.trim() || busy) return;
    setBusy(true); setErr("");
    try {
      await firebase.auth().signInAnonymously();
      const docId = await sha256Hex("ledger::" + pass.trim());
      const ref = getDocRef(docId);
      const snap = await ref.get();
      if (!snap.exists) {
        const ok = confirm("這個通關密語還沒有對應的帳本。\n第一次使用請按「確定」建立新帳本;\n如果只是打錯字,請按「取消」重新輸入。");
        if (!ok) { setBusy(false); return; }
        await ref.set({ json: JSON.stringify(DEFAULT_DATA), updatedAt: new Date().toISOString() });
      }
      onUnlock(docId);
    } catch (e) {
      console.error(e);
      setErr("連線失敗:" + (e?.message || "") + "(請確認 Firebase 已啟用匿名登入與 Firestore 規則)");
      setBusy(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div className="card fade" style={{ width: "100%", maxWidth: 380, padding: "34px 28px 28px", textAlign: "center" }}>
        <div style={{ fontSize: 40 }}>🔒</div>
        <h1 style={{ fontSize: 24, fontWeight: 900, margin: "10px 0 4px" }}>
          記帳本<span style={{ color: "var(--accent)" }}>.</span>
        </h1>
        <p style={{ fontSize: 13.5, color: "var(--sub)", margin: "0 0 20px" }}>輸入通關密語,打開你們的帳本</p>
        <input
          type="password" className="inp" placeholder="通關密語" value={pass} autoFocus
          onChange={(e) => setPass(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && go()}
          style={{ textAlign: "center", fontSize: 16 }}
        />
        {err && <div style={{ fontSize: 12.5, color: "var(--danger)", marginTop: 10, lineHeight: 1.6 }}>{err}</div>}
        <button className="btn" style={{ width: "100%", marginTop: 16, opacity: busy ? 0.6 : 1 }} onClick={go}>
          {busy ? "解鎖中…" : "進入帳本"}
        </button>
        <p style={{ fontSize: 11.5, color: "var(--sub)", marginTop: 14, lineHeight: 1.6 }}>
          密語就是鑰匙:兩個人輸入同一組密語,就會看到同一本帳本。
        </p>
      </div>
    </div>
  );
}

/* ───────── 入口:先過鎖再進帳本 ───────── */
function App() {
  const [docId, setDocId] = useState(() => (firebaseReady ? localStorage.getItem(PASS_KEY) : null));
  if (firebaseReady && !docId) {
    return <LockScreen onUnlock={(id) => { localStorage.setItem(PASS_KEY, id); setDocId(id); }} />;
  }
  const lock = () => {
    localStorage.removeItem(PASS_KEY);
    try { firebase.auth().signOut(); } catch (e) {}
    location.reload();
  };
  return <Ledger docId={docId} onLock={firebaseReady ? lock : null} />;
}

function Ledger({ docId, onLock }) {
  const docRef = getDocRef(docId);
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("add");
  const [sync, setSync] = useState("載入中…");
  const [modal, setModal] = useState(null);
  const [notices, setNotices] = useState([]);
  const saveTimer = useRef(null);
  const lastWritten = useRef("");     // 我們自己寫出去的內容,避免 snapshot 迴圈
  const settled = useRef(false);      // 自動扣款只在首次載入跑一次
  const started = useRef(false);

  /* ── 載入 + 即時監聽 ── */
  useEffect(() => {
    if (started.current) return;
    started.current = true;

    const applyIncoming = (raw) => {
      let d;
      try { d = migrate(JSON.parse(raw)); }
      catch { d = structuredClone(DEFAULT_DATA); }
      if (!settled.current) {
        settled.current = true;
        const ns = autoSettle(d);
        if (ns.length) setNotices((p) => [...p, ...ns]);
      }
      setData(d);
      setSync(firebaseReady ? "已同步 ☁︎" : "僅本機儲存");
    };

    if (docRef) {
      (async () => {
        try {
          if (!firebase.auth().currentUser) await firebase.auth().signInAnonymously();
        } catch (e) { console.warn(e); }
        docRef.onSnapshot(
          (snap) => {
            if (snap.metadata.hasPendingWrites) return;      // 自己寫的,不用回灌
            if (!snap.exists) { applyIncoming(JSON.stringify(DEFAULT_DATA)); return; }
            const raw = snap.data().json || JSON.stringify(DEFAULT_DATA);
            if (raw === lastWritten.current) return;         // 內容沒變
            applyIncoming(raw);
          },
          (err) => {
            console.error(err);
            setSync("連線失敗,請檢查 Firebase 設定");
            applyIncoming(localStorage.getItem(LOCAL_KEY) || JSON.stringify(DEFAULT_DATA));
          }
        );
      })();
    } else {
      setNotices((p) => [...p, "warn:尚未設定 Firebase,資料只存在這台裝置,無法共同編輯。打開檔案填入 FIREBASE_CONFIG 即可啟用雲端同步。"]);
      applyIncoming(localStorage.getItem(LOCAL_KEY) || JSON.stringify(DEFAULT_DATA));
    }
  }, []);

  /* ── 變更後自動儲存 ── */
  useEffect(() => {
    if (!data) return;
    const json = JSON.stringify(data);
    if (json === lastWritten.current) return;
    setSync("儲存中…");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      lastWritten.current = json;
      try {
        if (docRef) {
          await docRef.set({ json, updatedAt: new Date().toISOString() });
          setSync("已同步 ☁︎");
        } else {
          localStorage.setItem(LOCAL_KEY, json);
          setSync("僅本機儲存");
        }
      } catch (e) {
        console.error(e);
        setSync("儲存失敗");
      }
    }, 700);
  }, [data]);

  const update = (fn) => setData((d) => fn(structuredClone(d)));

  if (!data)
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <p style={{ color: "var(--sub)" }}>載入中…</p>
      </div>
    );

  return (
    <div style={{ padding: "24px 16px 64px" }}>
      <div style={{ maxWidth: 760, margin: "0 auto" }}>
        <header style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "0 4px", marginBottom: 18 }}>
          <h1 style={{ fontSize: 24, fontWeight: 900, margin: 0, letterSpacing: ".02em" }}>
            記帳本<span style={{ color: "var(--accent)" }}>.</span>
          </h1>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 12.5, color: "var(--sub)" }}>{sync}</span>
            {onLock && (
              <button className="btn ghost" style={{ padding: "4px 12px", fontSize: 12.5 }} onClick={onLock} title="鎖定並登出">🔒 鎖定</button>
            )}
          </div>
        </header>

        {notices.map((n, i) =>
          n.startsWith("warn:")
            ? <div key={i} className="notice warn">⚠️ {n.slice(5)}</div>
            : <div key={i} className="notice">💳 {n}</div>
        )}

        <div className="seg" style={{ marginBottom: 22 }}>
          {[["add", "記一筆"], ["home", "總覽"], ["split", "快速記帳"], ["cat", "分類"], ["wallet", "錢包"]].map(([k, label]) => (
            <button key={k} className={tab === k ? "on" : ""} onClick={() => setTab(k)}>{label}</button>
          ))}
        </div>

        {tab === "add" && <AddTab data={data} update={update} />}
        {tab === "home" && <HomeTab data={data} />}
        {tab === "split" && <SplitTab data={data} update={update} />}
        {tab === "cat" && <CatTab data={data} update={update} openModal={setModal} />}
        {tab === "wallet" && <WalletTab data={data} update={update} openModal={setModal} />}
      </div>

      {modal?.type === "cat" && <CatModal item={modal.item} onClose={() => setModal(null)} update={update} />}
      {modal?.type === "wallet" && (
        <WalletModal item={modal.item} wallets={data.wallets} onClose={() => setModal(null)} update={update} />
      )}
    </div>
  );
}

/* ── 共用 ── */
const sumByCur = (records, wallets) => {
  const map = {};
  records.forEach((r) => {
    const cur = r.currency || wallets.find((w) => w.id === r.walletId)?.currency || "TWD";
    map[cur] = (map[cur] || 0) + r.amount;
  });
  return map;
};
const curLine = (map) =>
  Object.entries(map).map(([c, v]) => fmtC(v, c)).join(" ＋ ") || fmtC(0);

const walletIcon = (w) => (w.type === "credit" ? "💳" : w.type === "cash" ? "👛" : "🏦");

function Field({ label, children }) {
  return (
    <label style={{ display: "block" }}>
      <span style={{ fontSize: 12.5, color: "var(--sub)", fontWeight: 500, display: "block", marginBottom: 5 }}>{label}</span>
      {children}
    </label>
  );
}

/* ───────── 總覽 ───────── */
function HomeTab({ data }) {
  const { categories, wallets, records } = data;
  const [ym, setYm] = useState(() => (nowYm() < MIN_YM ? MIN_YM : nowYm()));
  const [y, m] = ym.split("-").map(Number);

  const monthRecs = records.filter((r) => r.date.startsWith(ym));
  const totalMap = sumByCur(monthRecs, wallets);
  const twdTotal = totalMap.TWD || 0;

  const catStats = categories
    .map((c) => {
      const recs = monthRecs.filter((r) => r.categoryId === c.id);
      const map = sumByCur(recs, wallets);
      return { ...c, map, twd: map.TWD || 0, count: recs.length };
    })
    .sort((a, b) => b.twd - a.twd);
  const maxTwd = Math.max(...catStats.map((c) => c.twd), 1);

  const canPrev = ym > MIN_YM;
  const canNext = ym < nowYm();

  return (
    <div className="fade">
      <div className="card" style={{ padding: "24px 26px 22px", marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontSize: 15, fontWeight: 700 }}>{y} 年 {m} 月</div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn icon" disabled={!canPrev} onClick={() => setYm(shiftYm(ym, -1))} aria-label="上個月">←</button>
            <button className="btn icon" disabled={!canNext} onClick={() => setYm(shiftYm(ym, 1))} aria-label="下個月">→</button>
          </div>
        </div>
        <div style={{ fontSize: 13, color: "var(--sub)", marginTop: 10 }}>總支出</div>
        <div className="num" style={{ fontSize: 40, fontWeight: 900, color: "var(--accent-deep)" }}>
          {fmtC(twdTotal)}
        </div>
        {Object.keys(totalMap).filter((c) => c !== "TWD").map((c) => (
          <div key={c} className="num" style={{ fontSize: 14.5, color: "var(--clay)", fontWeight: 700 }}>
            ＋ {fmtC(totalMap[c], c)}(外幣)
          </div>
        ))}
        <div style={{ fontSize: 13, color: "var(--sub)", marginTop: 6 }}>共 {monthRecs.length} 筆紀錄</div>
      </div>

      <div className="card" style={{ padding: "22px 26px", marginBottom: 16 }}>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 16 }}>各分類支出</div>
        {catStats.every((c) => c.count === 0) && (
          <p style={{ color: "var(--sub)", fontSize: 14 }}>{m} 月沒有任何紀錄。</p>
        )}
        {catStats.filter((c) => c.count > 0).map((c) => (
          <div key={c.id} style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 5 }}>
              <span style={{ fontSize: 14.5, fontWeight: 500 }}>{c.emoji} {c.name}
                <span style={{ color: "var(--sub)", fontSize: 12.5, marginLeft: 6 }}>{c.count} 筆</span>
              </span>
              <span className="num" style={{ fontWeight: 700, fontSize: 14.5 }}>{curLine(c.map)}</span>
            </div>
            <div className="bar-track">
              <div className="bar-fill" style={{ width: `${(c.twd / maxTwd) * 100}%`, background: c.color }} />
            </div>
          </div>
        ))}
      </div>

      <div className="card" style={{ padding: "22px 26px" }}>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 14 }}>錢包速覽</div>
        {wallets.map((w) => {
          const st = w.type === "credit" ? cardStat(w, records) : null;
          return (
            <div key={w.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid var(--line)", fontSize: 14.5, gap: 8 }}>
              <span>{walletIcon(w)} {w.name}
                {w.currency !== "TWD" && <span className="chip" style={{ background: "var(--accent-soft)", color: "var(--accent-deep)", marginLeft: 8 }}>{w.currency}</span>}
              </span>
              {st
                ? <span className="num" style={{ fontWeight: 700, textAlign: "right" }}>
                    <span style={{ color: "var(--danger)" }}>應繳 {fmtC(st.due, w.currency)}</span>
                    <span style={{ color: "var(--clay)", marginLeft: 8 }}>待繳 {fmtC(st.upcoming, w.currency)}</span>
                  </span>
                : <span className="num" style={{ fontWeight: 700 }}>{fmtC(w.balance || 0, w.currency)}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ───────── 記一筆 ───────── */
function AddTab({ data, update }) {
  const { categories, wallets, records } = data;
  const [form, setForm] = useState({
    date: todayStr(), categoryId: categories[0]?.id || "", walletId: wallets[0]?.id || "", amount: "", note: "",
  });
  const wallet = wallets.find((w) => w.id === form.walletId);

  const addRecord = () => {
    const amt = parseFloat(form.amount);
    if (!amt || amt <= 0 || !form.categoryId || !form.walletId) return;
    update((d) => {
      const w = d.wallets.find((x) => x.id === form.walletId);
      d.records.unshift({ id: uid(), ...form, amount: amt, currency: w?.currency || "TWD" });
      if (w && w.type !== "credit") w.balance -= amt;
      return d;
    });
    setForm((f) => ({ ...f, amount: "", note: "" }));
  };

  const delRecord = (rec) => {
    const w = wallets.find((x) => x.id === rec.walletId);
    if (w?.type === "credit" && rec.date <= (w.paidThrough || "")) {
      if (!confirm("這筆卡費已經扣款過了,刪除不會退回帳戶餘額。確定刪除嗎?")) return;
    }
    update((d) => {
      d.records = d.records.filter((r) => r.id !== rec.id);
      const ww = d.wallets.find((x) => x.id === rec.walletId);
      if (ww && ww.type !== "credit") ww.balance += rec.amount;
      return d;
    });
  };

  return (
    <div className="fade">
      <div className="card" style={{ padding: "22px 24px", marginBottom: 16 }}>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 14 }}>新增支出</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 12 }}>
          <Field label="日期"><input type="date" className="inp" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} /></Field>
          <Field label="分類">
            <select className="sel" value={form.categoryId} onChange={(e) => setForm({ ...form, categoryId: e.target.value })}>
              {categories.map((c) => <option key={c.id} value={c.id}>{c.emoji} {c.name}</option>)}
            </select>
          </Field>
          <Field label="錢包">
            <select className="sel" value={form.walletId} onChange={(e) => setForm({ ...form, walletId: e.target.value })}>
              {wallets.map((w) => <option key={w.id} value={w.id}>{walletIcon(w)} {w.name}{w.type === "credit" ? "(信用卡)" : ""}{w.currency !== "TWD" ? `(${w.currency})` : ""}</option>)}
            </select>
          </Field>
          <Field label={`金額${wallet && wallet.currency !== "TWD" ? `(${wallet.currency})` : ""}`}>
            <input type="number" min="0" className="inp" placeholder="0" value={form.amount}
              onChange={(e) => setForm({ ...form, amount: e.target.value })}
              onKeyDown={(e) => e.key === "Enter" && addRecord()} />
          </Field>
        </div>
        {wallet?.type === "credit" && (
          <div style={{ fontSize: 12.5, color: "var(--clay)", marginTop: 10, fontWeight: 500 }}>
            💳 這筆會進入「{wallet.name}」的信用卡待繳款,{wallet.payDay ? `繳款日再從帳戶扣除` : `記得到錢包分頁設定結帳日與繳款日`}
          </div>
        )}
        <div style={{ display: "flex", gap: 12, marginTop: 12, alignItems: "flex-end" }}>
          <div style={{ flex: 1 }}>
            <Field label="備註(可留白)">
              <input className="inp" placeholder="例如:巷口滷味" value={form.note}
                onChange={(e) => setForm({ ...form, note: e.target.value })}
                onKeyDown={(e) => e.key === "Enter" && addRecord()} />
            </Field>
          </div>
          <button className="btn" onClick={addRecord}>記下來</button>
        </div>
      </div>

      <div className="card" style={{ padding: "20px 24px" }}>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 6 }}>最近的紀錄</div>
        {records.length === 0 && <p style={{ color: "var(--sub)", fontSize: 14 }}>還沒有任何紀錄。</p>}
        {records.slice(0, 40).map((r) => {
          const c = categories.find((x) => x.id === r.categoryId);
          const w = wallets.find((x) => x.id === r.walletId);
          return (
            <div key={r.id} className="rec-row" style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid var(--line)", fontSize: 14.5 }}>
              <span style={{ width: 36, height: 36, borderRadius: 12, flexShrink: 0, background: (c?.color || "#999") + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17 }}>{c?.emoji || "❓"}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 500 }}>{c?.name || "未分類"}{r.note && <span style={{ color: "var(--sub)", fontWeight: 400 }}> · {r.note}</span>}</div>
                <div style={{ fontSize: 12, color: "var(--sub)" }}>{r.date} · {w?.name || "?"}{w?.type === "credit" ? "(卡)" : ""}</div>
              </div>
              <div className="num" style={{ fontWeight: 700 }}>-{fmtC(r.amount, r.currency)}</div>
              <button className="btn ghost danger rec-del" onClick={() => delRecord(r)} aria-label="刪除">✕</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ───────── 快速記帳(代墊分帳)───────── */
function SplitTab({ data, update }) {
  const splits = data.splits || [];
  const [form, setForm] = useState({ date: todayStr(), note: "", amount: "", payer: P_ME, ower: "half" });

  const active = splits.filter((s) => s.type !== "settle" && !s.settled);

  const debtOf = (s) => {
    const other = s.payer === P_BF ? P_ME : P_BF;
    if (s.ower === "half") return other === P_BF ? s.amount / 2 : -s.amount / 2;
    if (s.ower === s.payer) return 0;
    return s.ower === P_BF ? s.amount : -s.amount;
  };
  const net = active.reduce((sum, s) => sum + debtOf(s), 0);

  const spendOf = (person) =>
    active.reduce((sum, s) => sum + (s.ower === "half" ? s.amount / 2 : s.ower === person ? s.amount : 0), 0);
  const bfSpend = spendOf(P_BF);
  const meSpend = spendOf(P_ME);

  const addSplit = () => {
    const amt = parseFloat(form.amount);
    if (!amt || amt <= 0) return;
    update((d) => {
      d.splits ||= [];
      d.splits.unshift({ id: uid(), ...form, amount: amt });
      return d;
    });
    setForm((f) => ({ ...f, amount: "", note: "" }));
  };

  const delSplit = (s) =>
    update((d) => { d.splits = d.splits.filter((x) => x.id !== s.id); return d; });

  const settleAll = () => {
    if (!active.length) return;
    const msg = net === 0
      ? "這一輪剛好互不相欠,確定結清嗎?"
      : `結清:${net > 0 ? P_BF : P_ME} 給 ${net > 0 ? P_ME : P_BF} ${fmtC(Math.abs(net))},確定嗎?`;
    if (!confirm(msg)) return;
    update((d) => {
      d.splits.forEach((s) => { if (s.type !== "settle" && !s.settled) s.settled = true; });
      d.splits.unshift({
        id: uid(), type: "settle", date: todayStr(),
        amount: Math.abs(net),
        from: net > 0 ? P_BF : P_ME,
        to: net > 0 ? P_ME : P_BF,
        even: net === 0,
      });
      return d;
    });
  };

  const owerLabel = (s) => (s.ower === "half" ? "各一半" : `${s.ower}支出`);

  return (
    <div className="fade">
      <div className="card" style={{ padding: "22px 24px", marginBottom: 16, borderTop: "4px solid var(--clay)" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div style={{ background: "var(--clay-soft)", borderRadius: 16, padding: "14px 16px", textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "var(--sub)", fontWeight: 500 }}>🐷 {P_BF}支出</div>
            <div className="num" style={{ fontSize: 24, fontWeight: 900, color: "var(--clay)", marginTop: 2 }}>{fmtC(bfSpend)}</div>
          </div>
          <div style={{ background: "var(--accent-soft)", borderRadius: 16, padding: "14px 16px", textAlign: "center" }}>
            <div style={{ fontSize: 13, color: "var(--sub)", fontWeight: 500 }}>🐰 {P_ME}支出</div>
            <div className="num" style={{ fontSize: 24, fontWeight: 900, color: "var(--accent-deep)", marginTop: 2 }}>{fmtC(meSpend)}</div>
          </div>
        </div>

        <div style={{ borderTop: "1px dashed var(--line)", marginTop: 16, paddingTop: 14, textAlign: "center" }}>
          <div style={{ fontSize: 13.5, color: "var(--sub)", fontWeight: 500 }}>目前結算</div>
          {net === 0 ? (
            <div style={{ fontSize: 22, fontWeight: 900, marginTop: 4 }}>互不相欠 🎉</div>
          ) : (
            <div style={{ marginTop: 4 }}>
              <span style={{ fontSize: 19, fontWeight: 700 }}>{net > 0 ? "🐷 " + P_BF : "🐰 " + P_ME}</span>
              <span style={{ fontSize: 15, color: "var(--sub)" }}> 要給 </span>
              <span style={{ fontSize: 19, fontWeight: 700 }}>{net > 0 ? "🐰 " + P_ME : "🐷 " + P_BF}</span>
              <div className="num" style={{ fontSize: 34, fontWeight: 900, color: "var(--clay)", marginTop: 2 }}>
                {fmtC(Math.abs(net))}
              </div>
            </div>
          )}
          <div style={{ fontSize: 13, color: "var(--sub)", marginTop: 6 }}>這一輪共 {active.length} 筆代墊</div>
          {active.length > 0 && (
            <button className="btn ghost" style={{ marginTop: 12 }} onClick={settleAll}>💸 已結清</button>
          )}
        </div>
      </div>

      <div className="card" style={{ padding: "22px 24px", marginBottom: 16 }}>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 14 }}>新增代墊</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(150px,1fr))", gap: 12 }}>
          <Field label="日期"><input type="date" className="inp" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} /></Field>
          <Field label="金額">
            <input type="number" min="0" className="inp" placeholder="0" value={form.amount}
              onChange={(e) => setForm({ ...form, amount: e.target.value })}
              onKeyDown={(e) => e.key === "Enter" && addSplit()} />
          </Field>
        </div>
        <div style={{ marginTop: 12 }}>
          <Field label="項目(可留白)">
            <input className="inp" placeholder="例如:週五晚餐" value={form.note}
              onChange={(e) => setForm({ ...form, note: e.target.value })}
              onKeyDown={(e) => e.key === "Enter" && addSplit()} />
          </Field>
        </div>
        <div style={{ marginTop: 14 }}>
          <span style={{ fontSize: 12.5, color: "var(--sub)", fontWeight: 500, display: "block", marginBottom: 6 }}>付款人(誰先付的錢)</span>
          <div className="pill-group">
            {[["🐷 " + P_BF, P_BF], ["🐰 " + P_ME, P_ME]].map(([label, v]) => (
              <button key={v} className={`pill ${form.payer === v ? "on" : ""}`} onClick={() => setForm({ ...form, payer: v })}>{label}</button>
            ))}
          </div>
        </div>
        <div style={{ marginTop: 14 }}>
          <span style={{ fontSize: 12.5, color: "var(--sub)", fontWeight: 500, display: "block", marginBottom: 6 }}>誰要支出(這筆算誰的)</span>
          <div className="pill-group">
            {[["🐷 " + P_BF, P_BF], ["🐰 " + P_ME, P_ME], ["🤝 各一半", "half"]].map(([label, v]) => (
              <button key={v} className={`pill ${form.ower === v ? "on" : ""}`} onClick={() => setForm({ ...form, ower: v })}>{label}</button>
            ))}
          </div>
        </div>
        <div style={{ textAlign: "right", marginTop: 16 }}>
          <button className="btn" onClick={addSplit}>記下來</button>
        </div>
      </div>

      <div className="card" style={{ padding: "20px 24px" }}>
        <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 6 }}>代墊紀錄</div>
        {splits.length === 0 && <p style={{ color: "var(--sub)", fontSize: 14 }}>目前沒有代墊紀錄,互不相欠 ☺︎</p>}
        {splits.map((s) => {
          if (s.type === "settle") {
            return (
              <div key={s.id} className="rec-row" style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid var(--line)", fontSize: 14 }}>
                <span style={{ width: 36, height: 36, borderRadius: 12, flexShrink: 0, background: "var(--accent-soft)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17 }}>💸</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, color: "var(--accent-deep)" }}>
                    {s.even ? "已結清:這一輪互不相欠 🎉" : `已結清:${s.from} 給了 ${s.to} ${fmtC(s.amount)}`}
                  </div>
                  <div style={{ fontSize: 12, color: "var(--sub)" }}>{s.date}</div>
                </div>
                <button className="btn ghost danger rec-del" onClick={() => delSplit(s)} aria-label="刪除">✕</button>
              </div>
            );
          }
          const d = debtOf(s);
          return (
            <div key={s.id} className="rec-row" style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid var(--line)", fontSize: 14.5, opacity: s.settled ? 0.5 : 1 }}>
              <span style={{ width: 36, height: 36, borderRadius: 12, flexShrink: 0, background: "var(--clay-soft)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17 }}>
                {s.payer === P_BF ? "🐷" : "🐰"}
              </span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 500 }}>
                  {s.note || "代墊"}
                  <span className="chip" style={{ background: "var(--accent-soft)", color: "var(--accent-deep)", marginLeft: 8 }}>{owerLabel(s)}</span>
                  {s.settled && <span className="chip" style={{ background: "var(--bg)", color: "var(--sub)", marginLeft: 6 }}>已結清</span>}
                </div>
                <div style={{ fontSize: 12, color: "var(--sub)" }}>
                  {s.date} · {s.payer} 付了 {fmtC(s.amount)}
                  {d !== 0 && <> · {d > 0 ? P_BF : P_ME} 欠 {fmtC(Math.abs(d))}</>}
                </div>
              </div>
              <div className="num" style={{ fontWeight: 700 }}>{fmtC(s.amount)}</div>
              <button className="btn ghost danger rec-del" onClick={() => delSplit(s)} aria-label="刪除">✕</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ───────── 分類 ───────── */

  const monthKey = nowYm();

  const delCat = (c) => {
    const used = records.some((r) => r.categoryId === c.id);
    const msg = used ? `「${c.name}」已有紀錄使用,刪除後那些紀錄會顯示為未分類。確定刪除嗎?` : `確定刪除「${c.name}」嗎?`;
    if (!confirm(msg)) return;
    update((d) => { d.categories = d.categories.filter((x) => x.id !== c.id); return d; });
  };

  return (
    <div className="fade">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 15.5, fontWeight: 700 }}>支出分類</div>
        <button className="btn" onClick={() => openModal({ type: "cat" })}>＋ 新增分類</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 14 }}>
        {categories.map((c) => {
          const map = sumByCur(records.filter((r) => r.categoryId === c.id && r.date.startsWith(monthKey)), data.wallets);
          return (
            <div key={c.id} className="card" style={{ padding: "20px 18px 16px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                <span style={{ width: 42, height: 42, borderRadius: 14, background: c.color + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 21 }}>{c.emoji}</span>
                <div>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>{c.name}</div>
                  <div className="num" style={{ fontSize: 12.5, color: "var(--sub)" }}>本月 {curLine(map)}</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn ghost" onClick={() => openModal({ type: "cat", item: c })}>編輯</button>
                <button className="btn ghost danger" onClick={() => delCat(c)}>刪除</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CatModal({ item, onClose, update }) {
  const [name, setName] = useState(item?.name || "");
  const [emoji, setEmoji] = useState(item?.emoji || "🍜");
  const [color, setColor] = useState(item?.color || CATEGORY_COLORS[0]);

  const save = () => {
    if (!name.trim()) return;
    update((d) => {
      if (item) Object.assign(d.categories.find((x) => x.id === item.id), { name: name.trim(), emoji, color });
      else d.categories.push({ id: uid(), name: name.trim(), emoji, color });
      return d;
    });
    onClose();
  };

  return (
    <Modal title={item ? "編輯分類" : "新增分類"} onClose={onClose} onSave={save}>
      <Field label="分類名稱"><input className="inp" value={name} onChange={(e) => setName(e.target.value)} placeholder="例如:寵物" autoFocus /></Field>
      <div style={{ marginTop: 14 }}>
        <span style={{ fontSize: 12.5, color: "var(--sub)", fontWeight: 500 }}>圖示</span>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 6 }}>
          {EMOJIS.map((e) => (
            <button key={e} onClick={() => setEmoji(e)} style={{
              fontSize: 19, padding: "5px 8px", borderRadius: 10, cursor: "pointer",
              border: emoji === e ? "2px solid var(--accent)" : "1px solid var(--line)",
              background: emoji === e ? "var(--accent-soft)" : "#fff",
            }}>{e}</button>
          ))}
        </div>
      </div>
      <div style={{ marginTop: 14 }}>
        <span style={{ fontSize: 12.5, color: "var(--sub)", fontWeight: 500 }}>代表色</span>
        <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
          {CATEGORY_COLORS.map((c) => (
            <button key={c} onClick={() => setColor(c)} aria-label={c} style={{
              width: 28, height: 28, borderRadius: "50%", background: c, cursor: "pointer",
              border: color === c ? "3px solid var(--ink)" : "1px solid var(--line)",
            }} />
          ))}
        </div>
      </div>
    </Modal>
  );
}

/* ───────── 錢包 ───────── */
function WalletTab({ data, update, openModal }) {
  const { wallets, records } = data;
  const banks = wallets.filter((w) => w.type !== "credit");
  const cards = wallets.filter((w) => w.type === "credit");

  const delWallet = (w) => {
    if (!confirm(`確定刪除「${w.name}」嗎?相關紀錄會保留,但不再連結錢包。`)) return;
    update((d) => {
      d.wallets = d.wallets.filter((x) => x.id !== w.id);
      d.wallets.forEach((x) => { if (x.linkedWalletId === w.id) x.linkedWalletId = ""; });
      return d;
    });
  };

  const payEarly = (card) => {
    const st = cardStat(card, records);
    if (!st.ready) { alert("請先在編輯裡設定結帳日和繳款日"); return; }
    if (!card.linkedWalletId) { alert("這張卡還沒設定扣款帳戶喔"); return; }
    if (st.due <= 0) { alert("本期沒有應繳金額"); return; }
    const acct = wallets.find((x) => x.id === card.linkedWalletId);
    if (!confirm(`提前從「${acct?.name}」扣繳本期卡費 ${fmtC(st.due, card.currency)}?\n(未出帳的 ${fmtC(st.upcoming, card.currency)} 會留到下期)`)) return;
    update((d) => {
      const c = d.wallets.find((x) => x.id === card.id);
      const a = d.wallets.find((x) => x.id === card.linkedWalletId);
      if (a) a.balance -= st.due;
      c.paidThrough = st.lastClose;
      return d;
    });
  };

  const linkedStats = (walletId) => {
    let due = 0, upcoming = 0;
    cards.filter((c) => c.linkedWalletId === walletId).forEach((c) => {
      const st = cardStat(c, records);
      due += st.due; upcoming += st.upcoming;
    });
    return { due, upcoming };
  };

  return (
    <div className="fade">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 15.5, fontWeight: 700 }}>帳戶餘額</div>
        <button className="btn" onClick={() => openModal({ type: "wallet" })}>＋ 新增錢包</button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(230px,1fr))", gap: 14, marginBottom: 26 }}>
        {banks.map((w) => {
          const { due, upcoming } = linkedStats(w.id);
          const after = (w.balance || 0) - due;
          return (
            <div key={w.id} className="card" style={{ padding: "20px 20px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 15.5, fontWeight: 700 }}>{walletIcon(w)} {w.name}</span>
                <span className="chip" style={{ background: "var(--accent-soft)", color: "var(--accent-deep)" }}>{w.currency}</span>
              </div>
              <div className="num" style={{ fontSize: 28, fontWeight: 900, margin: "6px 0 2px", color: "var(--accent-deep)" }}>
                {fmtC(w.balance || 0, w.currency)}
              </div>
              {due > 0 && (
                <div style={{ fontSize: 13, color: "var(--sub)" }}>
                  本期卡費 {fmtC(due, w.currency)} 待扣,扣完剩{" "}
                  <b className="num" style={{ color: after < 0 ? "var(--danger)" : "var(--ink)" }}>{fmtC(after, w.currency)}</b>
                </div>
              )}
              {upcoming > 0 && (
                <div style={{ fontSize: 12.5, color: "var(--clay)" }}>未出帳待繳款 {fmtC(upcoming, w.currency)}(下期)</div>
              )}
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button className="btn ghost" onClick={() => openModal({ type: "wallet", item: w })}>編輯</button>
                <button className="btn ghost danger" onClick={() => delWallet(w)}>刪除</button>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ fontSize: 15.5, fontWeight: 700, marginBottom: 14 }}>信用卡費</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(260px,1fr))", gap: 14 }}>
        {cards.map((w) => {
          const st = cardStat(w, records);
          const acct = wallets.find((x) => x.id === w.linkedWalletId);
          return (
            <div key={w.id} className="card" style={{ padding: "20px 20px 16px", borderTop: "4px solid var(--clay)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 15.5, fontWeight: 700 }}>💳 {w.name}</span>
                {st.ready
                  ? <span className="chip" style={{ background: "var(--danger-soft)", color: "var(--danger)" }}>結帳 {w.closeDay} 號・繳款 {w.payDay} 號</span>
                  : <span className="chip" style={{ background: "var(--bg)", color: "var(--sub)" }}>未設定週期</span>}
              </div>

              <div style={{ marginTop: 10 }}>
                <div style={{ fontSize: 12.5, color: "var(--sub)" }}>
                  本期應繳{st.dueDate && <>(將於 <b>{st.dueDate.slice(5).replace("-", "/")}</b> 扣款)</>}
                </div>
                <div className="num" style={{ fontSize: 26, fontWeight: 900, color: "var(--danger)" }}>
                  {fmtC(st.due, w.currency)}
                </div>
              </div>

              <div style={{ marginTop: 8, background: "var(--clay-soft)", borderRadius: 12, padding: "8px 12px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13 }}>
                  <span style={{ color: "var(--clay)", fontWeight: 700 }}>未出帳待繳款</span>
                  <span className="num" style={{ fontWeight: 900, color: "var(--clay)" }}>{fmtC(st.upcoming, w.currency)}</span>
                </div>
                {st.lastClose && (
                  <div style={{ fontSize: 11.5, color: "var(--sub)", marginTop: 2 }}>
                    {st.lastClose.slice(5).replace("-", "/")} 之後的消費,留到下期帳單
                  </div>
                )}
              </div>

              <div style={{ fontSize: 13, color: "var(--sub)", marginTop: 8 }}>
                {acct
                  ? <>從「{acct.name}」扣款,扣完剩 <b className="num" style={{ color: (acct.balance || 0) - st.due < 0 ? "var(--danger)" : "var(--ink)" }}>
                      {fmtC((acct.balance || 0) - st.due, acct.currency)}</b></>
                  : "尚未設定扣款帳戶"}
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                <button className="btn ghost" onClick={() => openModal({ type: "wallet", item: w })}>編輯</button>
                <button className="btn ghost" onClick={() => payEarly(w)}>提前扣款</button>
                <button className="btn ghost danger" onClick={() => delWallet(w)}>刪除</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function WalletModal({ item, wallets, onClose, update }) {
  const [name, setName] = useState(item?.name || "");
  const [type, setType] = useState(item?.type || "bank");
  const [currency, setCurrency] = useState(item?.currency || "TWD");
  const [balance, setBalance] = useState(item?.balance ?? "");
  const [closeDay, setCloseDay] = useState(item?.closeDay ?? "");
  const [payDay, setPayDay] = useState(item?.payDay ?? "");
  const [linked, setLinked] = useState(item?.linkedWalletId || "");

  const save = () => {
    if (!name.trim()) return;
    update((d) => {
      const base = { name: name.trim(), type, currency };
      const extra = type === "credit"
        ? { closeDay: parseInt(closeDay) || null, payDay: parseInt(payDay) || null, linkedWalletId: linked, paidThrough: item?.paidThrough || "" }
        : { balance: parseFloat(balance) || 0 };
      if (item) {
        const w = d.wallets.find((x) => x.id === item.id);
        Object.assign(w, base, extra);
        if (type === "credit") delete w.balance;
        else { delete w.closeDay; delete w.payDay; delete w.linkedWalletId; delete w.paidThrough; }
      } else {
        d.wallets.push({ id: uid(), ...base, ...extra });
      }
      return d;
    });
    onClose();
  };

  const accounts = wallets.filter((w) => w.type !== "credit" && w.id !== item?.id);

  return (
    <Modal title={item ? "編輯錢包" : "新增錢包"} onClose={onClose} onSave={save}>
      <Field label="錢包名稱"><input className="inp" value={name} onChange={(e) => setName(e.target.value)} placeholder="例如:美元帳戶" autoFocus /></Field>
      <div style={{ marginTop: 14 }}>
        <span style={{ fontSize: 12.5, color: "var(--sub)", fontWeight: 500 }}>類型</span>
        <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
          {[["cash", "👛 現金"], ["bank", "🏦 銀行"], ["credit", "💳 信用卡"]].map(([k, label]) => (
            <button key={k} className="btn ghost" onClick={() => setType(k)} style={{
              borderColor: type === k ? "var(--accent)" : "var(--line)",
              background: type === k ? "var(--accent-soft)" : "#fff",
              color: type === k ? "var(--accent-deep)" : "var(--sub)", fontWeight: type === k ? 700 : 500,
            }}>{label}</button>
          ))}
        </div>
      </div>
      <div style={{ marginTop: 14 }}>
        <Field label="幣別">
          <select className="sel" value={currency} onChange={(e) => setCurrency(e.target.value)}>
            {CURRENCIES.map(([c, s]) => <option key={c} value={c}>{c}({s})</option>)}
          </select>
        </Field>
      </div>

      {type !== "credit" ? (
        <div style={{ marginTop: 14 }}>
          <Field label="目前餘額"><input type="number" className="inp" value={balance} onChange={(e) => setBalance(e.target.value)} placeholder="0" /></Field>
        </div>
      ) : (
        <React.Fragment>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 14 }}>
            <Field label="結帳日(每月幾號)">
              <input type="number" min="1" max="31" className="inp" value={closeDay} onChange={(e) => setCloseDay(e.target.value)} placeholder="例如:23" />
            </Field>
            <Field label="繳款日(每月幾號)">
              <input type="number" min="1" max="31" className="inp" value={payDay} onChange={(e) => setPayDay(e.target.value)} placeholder="例如:9" />
            </Field>
          </div>
          <div style={{ fontSize: 12, color: "var(--sub)", marginTop: 6, lineHeight: 1.6 }}>
            例:結帳 23 號、繳款 9 號 → 6/24–7/23 的消費會在 8/9 從扣款帳戶自動扣除;7/24 之後的消費列為「未出帳待繳款」,留到下一期。
          </div>
          <div style={{ marginTop: 14 }}>
            <Field label="扣款帳戶">
              <select className="sel" value={linked} onChange={(e) => setLinked(e.target.value)}>
                <option value="">— 選擇帳戶 —</option>
                {accounts.map((w) => <option key={w.id} value={w.id}>{w.name}({w.currency})</option>)}
              </select>
            </Field>
          </div>
        </React.Fragment>
      )}
    </Modal>
  );
}

/* ───────── Modal ───────── */
function Modal({ title, children, onClose, onSave }) {
  return (
    <div className="overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="card fade" style={{ width: "100%", maxWidth: 420, padding: "26px 24px 20px" }}>
        <div style={{ fontSize: 17.5, fontWeight: 900, marginBottom: 18 }}>{title}</div>
        {children}
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 22 }}>
          <button className="btn ghost" onClick={onClose}>取消</button>
          <button className="btn" onClick={onSave}>儲存</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
